version: '3.8'

# Docker Compose para el Entorno de Desarrollo de Aurora Nova
# Basado en la configuración de compose-qa.yml

services:
  app:
    # Para desarrollo, construimos la imagen desde el código fuente
    build:
      context: ./application-base
    container_name: aurora-nova-app
    restart: unless-stopped
    ports:
      # Se usa 3000:3000 para desarrollo local estándar
      - "3000:3000"
    environment:
      TZ: America/El_Salvador
      LANG: es_SV.UTF-8
      DATABASE_URL: "postgresql://aurora_user:changeme_in_production@db:5432/aurora_nova_db"
      AUTH_SECRET: "dev-secret-key-change-this-in-production-aurora-nova-2025"
      NEXTAUTH_URL: "http://localhost:3000" # Ajustado para desarrollo local
      AUTH_TRUST_HOST: "true"
      APP_NAME: "Aurora Nova"
      APP_URL: "http://localhost:3000" # Ajustado para desarrollo local
      LOG_LEVEL: "debug"
      SMTP_HOST: ${SMTP_HOST}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      SMTP_PORT: ${SMTP_PORT}
      FROM_EMAIL: ${FROM_EMAIL}
    depends_on:
      - db

  worker:
    build:
      context: ./notification-worker
    container_name: aurora-nova-worker
    restart: always
    # NO EXPONE PUERTOS
    environment:
      TZ: America/El_Salvador
      LANG: es_SV.UTF-8
      DATABASE_URL: "postgresql://aurora_user:changeme_in_production@db:5432/aurora_nova_db"
      LOG_LEVEL: "debug"
      SMTP_HOST: ${SMTP_HOST}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      SMTP_PORT: ${SMTP_PORT}
      FROM_EMAIL: ${FROM_EMAIL}
    depends_on:
      - db
    healthcheck:
      test: ["CMD", "node", "dist/scripts/health-check.js"]
      interval: 30s
      timeout: 5s
      retries: 3

  db:
    image: postgres:18-alpine3.22
    container_name: aurora-nova-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: aurora_user
      POSTGRES_PASSWORD: changeme_in_production
      POSTGRES_DB: aurora_nova_db
      TZ: America/El_Salvador
      LANG: es_SV.UTF-8
    ports:
      - "5432:5432"
    volumes:
      - aurora-nova-db-data:/var/lib/postgresql/data

  test-db:
    image: postgres:18-alpine3.22
    container_name: aurora-nova-test-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: test
      POSTGRES_PASSWORD: test
      POSTGRES_DB: test_db
      TZ: America/El_Salvador
      LANG: es_SV.UTF-8
    ports:
      - "5433:5432"
    volumes:
      - aurora-nova-test-db-data:/var/lib/postgresql/data

volumes:
  aurora-nova-db-data:
  aurora-nova-test-db-data: